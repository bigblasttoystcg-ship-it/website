<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — BigBlastToys Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<script src="admin.js"></script>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Orders</div>
      <button class="btn btn-primary" onclick="openSaleModal()">+ Record Sale</button>
    </div>
    <div class="content">
      <div class="filters">
        <select id="filter-channel" onchange="loadOrders()">
          <option value="">All Channels</option>
          <option value="online">Online</option>
          <option value="instore">In-Store</option>
        </select>
        <select id="filter-status" onchange="loadOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="fulfilled">Fulfilled</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Customer</th><th>Channel</th><th>Total</th><th>Status</th><th>Date</th><th></th></tr></thead>
            <tbody id="orders-table"><tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Record Sale Modal -->
<div class="modal-overlay hidden" id="sale-modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title">Record a Sale</div>
      <button class="modal-close" onclick="closeSaleModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- Step 1: Search -->
      <div id="sale-step-1">
        <div class="form-group">
          <label>Search Inventory</label>
          <input type="text" id="sale-search" placeholder="Search by card name or set..." oninput="searchInventory()">
        </div>
        <div id="sale-search-results" style="display:none;margin-top:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:280px;overflow-y:auto"></div>
      </div>

      <!-- Step 2: Confirm card -->
      <div id="sale-step-2" style="display:none">
        <div style="background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:4px">
          <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px">Confirm Card Details</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#fff" id="confirm-name"></div>
          <div style="color:var(--muted);font-size:0.8rem;margin-top:2px" id="confirm-set"></div>
          <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap" id="confirm-badges"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
            <div><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Online Stock</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--blue)" id="confirm-online"></div></div>
            <div><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">In-Store Stock</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--green)" id="confirm-instore"></div></div>
          </div>
        </div>
        <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:0.8rem;color:var(--red);margin-bottom:4px">
          ⚠ Verify the grade and condition above before continuing.
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Channel</label>
            <select id="sale-channel">
              <option value="online">Online</option>
              <option value="instore">In-Store</option>
            </select>
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="sale-qty" value="1" min="1">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="sale-customer" placeholder="Walk-in">
          </div>
          <div class="form-group">
            <label>Sale Price ($)</label>
            <input type="number" id="sale-price" step="0.01" min="0" placeholder="Uses list price if blank">
          </div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="sale-back-btn" onclick="backToSearch()" style="display:none">← Back</button>
      <button class="btn btn-ghost" onclick="closeSaleModal()">Cancel</button>
      <button class="btn btn-primary" id="sale-confirm-btn" onclick="confirmSale()" style="display:none">Confirm Sale</button>
    </div>
  </div>
</div>

<!-- Order detail modal -->
<div class="modal-overlay hidden" id="order-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title" id="order-modal-title">Order Details</div>
      <button class="modal-close" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="modal-body" id="order-modal-body"></div>
    <div class="modal-footer" id="order-modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const statusBadge = s => ({
  pending:   '<span class="badge badge-low">Pending</span>',
  fulfilled: '<span class="badge badge-ok">Fulfilled</span>',
  cancelled: '<span class="badge badge-out">Cancelled</span>',
}[s] || s);

const channelBadge = c => c === 'online'
  ? '<span class="badge badge-blue">Online</span>'
  : '<span class="badge badge-gray">In-Store</span>';

async function loadOrders() {
  const channel = document.getElementById('filter-channel').value;
  const status  = document.getElementById('filter-status').value;
  const params  = new URLSearchParams({ channel, status });
  const orders  = await API.get('/orders?' + params).catch(() => []);

  document.getElementById('orders-table').innerHTML = orders.length ? orders.map(o => `
    <tr onclick="viewOrder('${o.id}')">
      <td><div class="td-name">${o.customer_name || 'Walk-in'}</div></td>
      <td>${channelBadge(o.channel)}</td>
      <td>${fmt(o.total)}</td>
      <td>${statusBadge(o.status)}</td>
      <td style="color:var(--muted)">${new Date(o.created_at).toLocaleDateString()}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="viewOrder('${o.id}');event.stopPropagation()">View</button></td>
    </tr>`).join('') :
    '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No orders found</td></tr>';
}

async function viewOrder(id) {
  const order = await API.get(`/orders/${id}`).catch(() => null);
  if (!order) return;
  document.getElementById('order-modal-title').textContent = `Order — ${order.customer_name || 'Walk-in'}`;
  document.getElementById('order-modal-body').innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:4px">
      <div><div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Channel</div><div style="margin-top:4px">${channelBadge(order.channel)}</div></div>
      <div><div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Status</div><div style="margin-top:4px">${statusBadge(order.status)}</div></div>
      <div><div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Date</div><div style="margin-top:4px;font-size:0.83rem">${new Date(order.created_at).toLocaleString()}</div></div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:8px">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Items</div>
      ${(order.items || []).map(i => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
          <div><div style="font-weight:600">${i.name}</div><div style="font-size:0.75rem;color:var(--muted)">${i.set_name || ''} × ${i.quantity}</div></div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--blue)">${fmt(i.price_at_sale * i.quantity)}</div>
        </div>`).join('') || '<div style="color:var(--muted);font-size:0.83rem">No items</div>'}
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-weight:700">
        <span>Total</span><span style="font-family:\'Bebas Neue\',sans-serif;font-size:1.3rem;color:var(--blue)">${fmt(order.total)}</span>
      </div>
    </div>`;

  const footer = document.getElementById('order-modal-footer');
  footer.innerHTML = `<button class="btn btn-ghost" onclick="closeOrderModal()">Close</button>`;
  if (order.status === 'pending') {
    footer.innerHTML += `
      <button class="btn btn-danger btn-sm" onclick="setStatus('${order.id}','cancelled')">Cancel</button>
      <button class="btn btn-primary" onclick="setStatus('${order.id}','fulfilled')">Mark Fulfilled</button>`;
  }
  document.getElementById('order-modal').classList.remove('hidden');
}

async function setStatus(id, status) {
  try {
    await API.patch(`/orders/${id}/status`, { status });
    showToast(`Order marked as ${status}`);
    closeOrderModal();
    loadOrders();
  } catch (e) { showToast(e.message, 'error'); }
}

function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); }

// ── Record Sale ───────────────────────────────────────────
let selectedItem = null;

function openSaleModal() {
  selectedItem = null;
  document.getElementById('sale-search').value = '';
  document.getElementById('sale-search-results').style.display = 'none';
  document.getElementById('sale-search-results').innerHTML = '';
  document.getElementById('sale-step-1').style.display = 'block';
  document.getElementById('sale-step-2').style.display = 'none';
  document.getElementById('sale-back-btn').style.display = 'none';
  document.getElementById('sale-confirm-btn').style.display = 'none';
  document.getElementById('sale-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('sale-search').focus(), 100);
}

function closeSaleModal() { document.getElementById('sale-modal').classList.add('hidden'); }

let searchTimer;
async function searchInventory() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('sale-search').value.trim();
    const results = document.getElementById('sale-search-results');
    if (!q) { results.style.display = 'none'; return; }
    const inv = await API.get(`/inventory?search=${encodeURIComponent(q)}`).catch(() => []);
    if (!inv.length) {
      results.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:0.85rem;text-align:center">No cards found</div>';
      results.style.display = 'block';
      return;
    }
    results.innerHTML = inv.slice(0, 8).map(i => `
      <div onclick='selectItem(${JSON.stringify(i).replace(/'/g,"&#39;")})' style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s" onmouseover="this.style.background='rgba(0,170,255,0.06)'" onmouseout="this.style.background=''">
        <div>
          <div style="font-weight:600;font-size:0.88rem">${i.name}</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:2px">${i.set_name || ''} ${i.grade ? '· <span style="color:#a78bfa">' + i.grade + '</span>' : ''} · ${i.condition}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--blue)">${fmt(i.price)}</div>
          <div style="font-size:0.72rem;color:var(--muted)">Online: ${i.online_stock} · Store: ${i.instore_stock}</div>
        </div>
      </div>`).join('');
    results.style.display = 'block';
  }, 250);
}

function selectItem(item) {
  selectedItem = item;
  document.getElementById('sale-step-1').style.display = 'none';
  document.getElementById('sale-step-2').style.display = 'block';
  document.getElementById('sale-back-btn').style.display = 'inline-flex';
  document.getElementById('sale-confirm-btn').style.display = 'inline-flex';
  document.getElementById('sale-price').value = item.price || '';

  document.getElementById('confirm-name').textContent = item.name;
  document.getElementById('confirm-set').textContent  = [item.set_name, item.variant].filter(Boolean).join(' · ');
  document.getElementById('confirm-online').textContent  = item.online_stock;
  document.getElementById('confirm-instore').textContent = item.instore_stock;

  const badges = [];
  if (item.grade)     badges.push(`<span class="badge badge-purple">${item.grade}</span>`);
  if (item.condition) badges.push(`<span class="badge badge-gray">${item.condition}</span>`);
  if (item.category)  badges.push(`<span class="badge badge-blue">${item.category}</span>`);
  document.getElementById('confirm-badges').innerHTML = badges.join('');
}

function backToSearch() {
  selectedItem = null;
  document.getElementById('sale-step-1').style.display = 'block';
  document.getElementById('sale-step-2').style.display = 'none';
  document.getElementById('sale-back-btn').style.display = 'none';
  document.getElementById('sale-confirm-btn').style.display = 'none';
}

async function confirmSale() {
  if (!selectedItem) return;
  const btn = document.getElementById('sale-confirm-btn');
  btn.textContent = 'Processing...';
  btn.disabled = true;
  try {
    const result = await API.post('/sales', {
      inventory_id:  selectedItem.id,
      quantity:      parseInt(document.getElementById('sale-qty').value) || 1,
      channel:       document.getElementById('sale-channel').value,
      customer_name: document.getElementById('sale-customer').value || 'Walk-in',
      sale_price:    parseFloat(document.getElementById('sale-price').value) || null,
    });
    showToast(`Sale recorded — ${result.item.name} sold!`);
    closeSaleModal();
    loadOrders();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.textContent = 'Confirm Sale';
    btn.disabled = false;
  }
}

(async () => {
  await initPage('Orders');
  loadOrders();
})();
</script>
</body>
</html>
