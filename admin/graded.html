<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graded Cards — BigBlastToys Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<script src="admin.js"></script>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Graded Cards</div>
      <input type="text" id="search" placeholder="Search cards or sets..." oninput="loadGraded()" class="topbar-search-input">
      <button class="btn btn-primary" onclick="openModal()">+ Add Graded Card</button>
    </div>

    <div class="inv-layout">

      <!-- Filter Sidebar -->
      <div class="inv-filter-sidebar">

        <div class="inv-filter-section">
          <div class="inv-filter-label">Grading Company</div>
          <div class="inv-filter-options">
            <label class="inv-filter-radio"><input type="radio" name="company" value="" onchange="loadGraded()" checked> All</label>
            <label class="inv-filter-radio"><input type="radio" name="company" value="PSA" onchange="loadGraded()"> PSA</label>
            <label class="inv-filter-radio"><input type="radio" name="company" value="BGS" onchange="loadGraded()"> BGS</label>
            <label class="inv-filter-radio"><input type="radio" name="company" value="CGC" onchange="loadGraded()"> CGC</label>
            <label class="inv-filter-radio"><input type="radio" name="company" value="TAG" onchange="loadGraded()"> TAG</label>
          </div>
        </div>

        <div class="inv-filter-section">
          <div class="inv-filter-label">Condition</div>
          <div class="inv-filter-options">
            <label class="inv-filter-radio"><input type="radio" name="condition" value="" onchange="loadGraded()" checked> All</label>
            <label class="inv-filter-radio"><input type="radio" name="condition" value="NM" onchange="loadGraded()"> NM</label>
            <label class="inv-filter-radio"><input type="radio" name="condition" value="LP" onchange="loadGraded()"> LP</label>
            <label class="inv-filter-radio"><input type="radio" name="condition" value="MP" onchange="loadGraded()"> MP</label>
            <label class="inv-filter-radio"><input type="radio" name="condition" value="HP" onchange="loadGraded()"> HP</label>
            <label class="inv-filter-radio"><input type="radio" name="condition" value="DMG" onchange="loadGraded()"> DMG</label>
          </div>
        </div>

        <div class="inv-filter-section">
          <div class="inv-filter-label">Sale Channel</div>
          <div class="inv-filter-options">
            <label class="inv-filter-radio"><input type="radio" name="channel" value="" onchange="loadGraded()" checked> All Channels</label>
            <label class="inv-filter-radio"><input type="radio" name="channel" value="online" onchange="loadGraded()"> Online</label>
            <label class="inv-filter-radio"><input type="radio" name="channel" value="instore" onchange="loadGraded()"> In-Person</label>
          </div>
        </div>

        <div class="inv-filter-section">
          <div class="inv-filter-label">Sort By</div>
          <select id="sort-by" onchange="loadGraded()">
            <option value="updated">Recently Updated</option>
            <option value="price-high">Price: High to Low</option>
            <option value="price-low">Price: Low to High</option>
            <option value="name-az">Name: A → Z</option>
            <option value="grade-high">Grade: High to Low</option>
            <option value="grade-low">Grade: Low to High</option>
          </select>
        </div>

      </div>

      <!-- Card Grid -->
      <div class="inv-grid-wrap">
        <div class="inv-grid" id="graded-grid">
          <div style="color:var(--muted);padding:48px;text-align:center">Loading...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Graded Card</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <div id="modal-img-wrap" style="display:none;text-align:center;margin-bottom:16px">
        <img id="modal-img" src="" alt="Card image"
          style="max-height:200px;max-width:100%;border-radius:8px;object-fit:contain;box-shadow:0 4px 20px rgba(0,0,0,0.4)">
      </div>

      <div class="form-row">
        <div class="form-group"><label>Card Name *</label><input type="text" id="f-name" placeholder="Charizard ex"></div>
        <div class="form-group"><label>Set Name</label><input type="text" id="f-set" placeholder="Obsidian Flames"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Grading Company</label>
          <select id="f-grade-company">
            <option value="">Ungraded</option>
            <option value="PSA">PSA</option>
            <option value="BGS">BGS</option>
            <option value="CGC">CGC</option>
            <option value="TAG">TAG</option>
          </select>
        </div>
        <div class="form-group"><label>Grade</label>
          <select id="f-grade-num">
            <option value="">—</option>
            <option value="1">1</option><option value="1.5">1.5</option>
            <option value="2">2</option><option value="2.5">2.5</option>
            <option value="3">3</option><option value="3.5">3.5</option>
            <option value="4">4</option><option value="4.5">4.5</option>
            <option value="5">5</option><option value="5.5">5.5</option>
            <option value="6">6</option><option value="6.5">6.5</option>
            <option value="7">7</option><option value="7.5">7.5</option>
            <option value="8">8</option><option value="8.5">8.5</option>
            <option value="9">9</option><option value="9.5">9.5</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Condition</label>
          <select id="f-condition">
            <option value="NM">NM</option><option value="LP">LP</option>
            <option value="MP">MP</option><option value="HP">HP</option>
            <option value="DMG">DMG</option>
          </select>
        </div>
        <div class="form-group"><label>Price ($)</label>
          <input type="number" id="f-price" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Online Stock</label><input type="number" id="f-online" value="0" min="0"></div>
        <div class="form-group"><label>In-Store Stock</label><input type="number" id="f-instore" value="0" min="0"></div>
      </div>
      <div class="form-group"><label>Sale Channel</label>
        <select id="f-channel">
          <option value="both">Online &amp; In-Person</option>
          <option value="online">Online Only</option>
          <option value="instore">In-Person Only</option>
        </select>
      </div>
      <div class="form-group"><label>Image URL</label>
        <input type="url" id="f-img" placeholder="https://..." oninput="updateImgPreview(this.value)">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
let currentUser;

function cleanGrade(g) {
  if (!g) return null;
  const co = ['PSA','BGS','CGC','TAG'].find(c => g.toUpperCase().startsWith(c));
  const match = g.match(/(\d+(\.\d+)?)/);
  if (!co || !match) return g;
  return `${co} ${parseFloat(match[1])}`;
}

function getFilter(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}

async function loadGraded() {
  const search    = document.getElementById('search').value;
  const condition = getFilter('condition');
  const channel   = getFilter('channel');
  const company   = getFilter('company');
  const sortBy    = document.getElementById('sort-by').value;
  const params    = new URLSearchParams({ search, category: 'graded', condition, channel });
  let data = await API.get('/inventory?' + params).catch(() => []);

  // Client-side company filter (grade starts with company name)
  if (company) data = data.filter(c => (c.grade || '').toUpperCase().startsWith(company));

  data.sort((a, b) => {
    const ga = parseFloat((a.grade || '').split(' ')[1]) || 0;
    const gb = parseFloat((b.grade || '').split(' ')[1]) || 0;
    switch (sortBy) {
      case 'price-high':  return b.price - a.price;
      case 'price-low':   return a.price - b.price;
      case 'name-az':     return a.name.localeCompare(b.name);
      case 'grade-high':  return gb - ga;
      case 'grade-low':   return ga - gb;
      default:            return 0;
    }
  });

  const isAdmin = currentUser?.role === 'admin';
  const iData = c => JSON.stringify(c).replace(/"/g, '&quot;');

  document.getElementById('graded-grid').innerHTML = data.length ? data.map(c => {
    const grade   = cleanGrade(c.grade);
    const condCls = { NM:'badge-ok', LP:'badge-low', MP:'badge-orange', DMG:'badge-out' }[c.condition] || 'badge-gray';
    return `
    <div class="inv-card" onclick="location.href='/admin/item.html?id=${c.id}'">
      <div class="inv-card-img-wrap">
        ${c.img_url
          ? `<img src="${c.img_url}" alt="${c.name}" class="inv-card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="inv-card-img-placeholder" style="${c.img_url ? 'display:none' : ''}">
          <span>No Image</span>
        </div>
        ${grade ? `<div class="inv-grade-badge">${grade}</div>` : ''}
        ${c.sale_channel === 'online'  ? `<div class="inv-channel-badge ch-online">Online</div>`    : ''}
        ${c.sale_channel === 'instore' ? `<div class="inv-channel-badge ch-instore">In-Person</div>` : ''}
      </div>
      <div class="inv-card-body">
        <div class="inv-card-name">${c.name}</div>
        <div class="inv-card-sub">${c.set_name || ''}</div>
        <div class="inv-card-badges">
          <span class="badge badge-gold">graded</span>
          <span class="badge ${condCls}">${c.condition}</span>
        </div>
        <div class="inv-card-price">${fmt(c.price)}</div>
        <div class="inv-card-stock" onclick="event.stopPropagation()">
          <div class="inv-stock-row">
            <span class="inv-stock-label">Online</span>
            <input class="stock-input" type="number" value="${c.online_stock}" min="0" onchange="updateStock('${c.id}', this, 'online')" title="Online stock">
          </div>
          <div class="inv-stock-row">
            <span class="inv-stock-label">In-Store</span>
            <input class="stock-input" type="number" value="${c.instore_stock}" min="0" onchange="updateStock('${c.id}', this, 'instore')" title="In-store stock">
          </div>
        </div>
        <div class="inv-card-footer" onclick="event.stopPropagation()">
          ${stockBadge(c.online_stock, c.instore_stock, c.low_stock_threshold)}
          <div class="inv-card-actions">
            ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteCard('${c.id}','${c.name}');event.stopPropagation()">Del</button>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('') :
  '<div style="color:var(--muted);padding:48px;text-align:center;width:100%">No graded cards found</div>';
}

async function updateStock(id, input, field) {
  const item = await API.get(`/inventory/${id}`).catch(() => null);
  if (!item) return;
  const online  = field === 'online'  ? parseInt(input.value) : item.online_stock;
  const instore = field === 'instore' ? parseInt(input.value) : item.instore_stock;
  try {
    await API.patch(`/inventory/${id}/stock`, { online_stock: online, instore_stock: instore });
    showToast('Stock updated');
  } catch (e) { showToast(e.message, 'error'); }
}

function updateImgPreview(url) {
  const wrap = document.getElementById('modal-img-wrap');
  const img  = document.getElementById('modal-img');
  if (url) {
    img.src = url;
    wrap.style.display = 'block';
    img.onerror = () => { wrap.style.display = 'none'; };
    img.onload  = () => { wrap.style.display = 'block'; };
  } else {
    wrap.style.display = 'none';
  }
}

function openModal(c = null) {
  document.getElementById('edit-id').value          = c?.id || '';
  document.getElementById('modal-title').textContent = c ? 'Edit Graded Card' : 'Add Graded Card';
  document.getElementById('f-name').value           = c?.name || '';
  document.getElementById('f-set').value            = c?.set_name || '';
  document.getElementById('f-condition').value      = c?.condition || 'NM';
  document.getElementById('f-price').value          = c?.price || '';
  document.getElementById('f-online').value         = c?.online_stock ?? 0;
  document.getElementById('f-instore').value        = c?.instore_stock ?? 0;
  document.getElementById('f-channel').value        = c?.sale_channel || 'both';
  document.getElementById('f-img').value            = c?.img_url || '';
  const gradeParts = cleanGrade(c?.grade) ? cleanGrade(c.grade).split(' ') : [];
  document.getElementById('f-grade-company').value  = gradeParts[0] || '';
  document.getElementById('f-grade-num').value      = gradeParts[1] || '';
  updateImgPreview(c?.img_url || '');
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function saveCard() {
  const id  = document.getElementById('edit-id').value;
  const co  = document.getElementById('f-grade-company').value;
  const num = document.getElementById('f-grade-num').value;
  const body = {
    name:                document.getElementById('f-name').value,
    set_name:            document.getElementById('f-set').value,
    category:            'graded',
    condition:           document.getElementById('f-condition').value,
    price:               parseFloat(document.getElementById('f-price').value) || 0,
    online_stock:        parseInt(document.getElementById('f-online').value)   || 0,
    instore_stock:       parseInt(document.getElementById('f-instore').value)  || 0,
    low_stock_threshold: 1,
    sale_channel:        document.getElementById('f-channel').value || 'both',
    grade:               (co && num) ? `${co} ${num}` : null,
    img_url:             document.getElementById('f-img').value || null,
    variant:             null,
  };
  try {
    if (id) { await API.put(`/inventory/${id}`, body); showToast('Card updated'); }
    else     { await API.post('/inventory', body);      showToast('Card added');   }
    closeModal();
    loadGraded();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteCard(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await API.delete(`/inventory/${id}`);
    showToast(`${name} deleted`);
    loadGraded();
  } catch (e) { showToast(e.message, 'error'); }
}

(async () => {
  currentUser = await initPage('Graded Cards');
  loadGraded();
})();
</script>
</body>
</html>
